<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Task 7 - Tần suất trạng thái thời tiết</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="style.css" />
    <style>
      .chart-container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 20px;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 20px;
        padding: 10px 16px;
        background: #6b21a8;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        transition: background 200ms ease;
      }
      .back-link:hover {
        background: #115e59;
      }
      .chart-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin: 18px 0 18px;
        align-items: center;
        background: rgba(255, 255, 255, 0.88);
        padding: 16px;
        border-radius: 16px;
        border: 1px solid #e2e8f0;
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      }
      .filter-select {
        border: 1px solid rgba(15, 23, 42, 0.12);
        border-radius: 8px;
        padding: 8px 12px;
        background: rgba(255, 255, 255, 0.92);
        color: #0f172a;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        outline: none;
      }
      .summary-box {
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        gap: 20px;
      }
      .stat-item {
        flex: 1;
        padding: 16px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid #e2e8f0;
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      }
      
      /* --- LAYOUT CHIA ĐÔI: BIỂU ĐỒ & CHÚ GIẢI TÁCH RỜI --- */
      .chart-layout {
        display: flex;
        gap: 24px;
        align-items: flex-start;
      }
      .chart-card {
        flex: 1;
        background: #ffffff;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
        border: 1px solid #e2e8f0;
      }
      .legend-card {
        width: 280px;
        background: #ffffff;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
        border: 1px solid #e2e8f0;
      }
      .legend-title {
        margin-top: 0;
        margin-bottom: 16px;
        font-size: 16px;
        font-weight: 700;
        color: #1e293b;
        border-bottom: 1px solid #f1f5f9;
        padding-bottom: 12px;
      }
      .legend-list {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        transition: all 200ms ease;
      }
      
      /* Hiệu ứng mờ diện rộng áp dụng chung cho cả cột và chữ chú giải */
      .bar-rect, .legend-item {
        transition: opacity 200ms ease, filter 200ms ease;
      }
      .dimmed {
        opacity: 0.15 !important;
      }
      
      #tooltip {
        position: absolute;
        opacity: 0;
        pointer-events: none;
        background: rgba(255, 255, 255, 0.98);
        padding: 14px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        border: 1px solid #e2e8f0;
        font-size: 13px;
        line-height: 1.5;
        z-index: 1000;
        transition: opacity 150ms ease;
        color: #1e293b;
      }
      .domain, .tick line {
        stroke: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <div class="chart-container">
      <a href="index.html" class="back-link">← Quay lại trang chủ</a>
      
      <h1>Tần suất trạng thái thời tiết</h1>
      
      <div class="chart-controls">
        <label style="font-weight: 600; color: #334155;">Vùng (Region):</label>
        <select id="region-filter" class="filter-select">
          <option value="All">Tất cả các vùng</option>
        </select>

        <span style="border-left: 1px solid #cbd5e1; height: 24px; margin: 0 8px;"></span>

        <label style="font-weight: 600; color: #334155;">Từ tháng:</label>
        <select id="start-month" class="filter-select"></select>
        <span style="font-weight: 600; color: #334155;">đến:</span>
        <select id="end-month" class="filter-select"></select>

        <span style="border-left: 1px solid #cbd5e1; height: 24px; margin: 0 8px;"></span>

        <label style="font-weight: 600; color: #334155;">Sắp xếp:</label>
        <select id="sort-filter" class="filter-select">
          <option value="desc">Số lần xuất hiện: Giảm dần</option>
          <option value="asc">Số lần xuất hiện: Tăng dần</option>
        </select>
      </div>

      <div class="summary-box">
        <div class="stat-item">
          <div style="color: #ea580c; font-weight: bold; font-size: 13px; text-transform: uppercase;">📈 Xuất hiện nhiều nhất</div>
          <div id="highest-weather" style="font-size: 18px; font-weight: 700; margin-top: 8px;">--</div>
        </div>
        <div class="stat-item">
          <div style="color: #0284c7; font-weight: bold; font-size: 13px; text-transform: uppercase;">📉 Xuất hiện ít nhất</div>
          <div id="lowest-weather" style="font-size: 18px; font-weight: 700; margin-top: 8px;">--</div>
        </div>
      </div>

      <div class="chart-layout">
        <div class="chart-card">
          <svg id="chart7" style="width: 100%; height: auto; min-height: 480px;"></svg>
        </div>
        
        <div class="legend-card">
          <h3 class="legend-title">Chú giải</h3>
          <div id="chart-legend" class="legend-list"></div>
        </div>
      </div>
    </div>

    <div id="tooltip"></div>

    <script src="task7.js"></script>
  </body>
</html>
