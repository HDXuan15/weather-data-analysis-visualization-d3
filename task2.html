<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Task 2 - So sánh nhiệt độ giữa các vùng</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="style.css" />
    <style>
      .chart-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }
      .back-link {
        display: inline-block;
        margin-bottom: 20px;
        padding: 10px 16px;
        background: #6b21a8;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        transition: background 200ms ease;
      }
      .back-link:hover {
        background: #115e59;
      }
      /* Stat card styles */
      .stat-card {
        display: inline-flex;
        gap: 12px;
        padding: 10px 14px;
        border-radius: 10px;
        background: linear-gradient(180deg, #ffffff, #f7fafb);
        border: 1px solid rgba(15, 23, 42, 0.06);
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.06);
        align-items: center;
      }
      /* Adopt Task 4 summary-box styling */
      .summary-box {
        margin-bottom: 20px;
        padding: 16px;
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid rgba(15, 23, 42, 0.06);
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
        font-size: 15px;
        color: #0f172a;
        line-height: 1.6;
        display: flex;
        justify-content: space-between;
        gap: 20px;
      }
      .summary-box .stat-item {
        flex: 1;
        padding: 12px;
        border-radius: 12px;
        background: #f8fafc;
        border: 1px solid rgba(15, 23, 42, 0.04);
      }
      .stat-item {
        min-width: 220px;
      }
      .stat-label {
        display: block;
        font-size: 13px;
        color: #475569;
      }
      .stat-value {
        display: block;
        font-size: 16px;
        font-weight: 800;
        color: #0f172a;
      }
      /* entrance animation */
      .stat-card .stat-item {
        opacity: 0;
        transform: translateY(6px);
      }
      .stat-card.visible .stat-item {
        animation: fadeUp 360ms ease forwards;
      }
      .stat-card.visible .stat-item:nth-child(1) {
        animation-delay: 0ms;
      }
      .stat-card.visible .stat-item:nth-child(2) {
        animation-delay: 80ms;
      }
      @keyframes fadeUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .chart-controls {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin: 18px 0 18px;
      }
      .sort-button {
        border: 1px solid rgba(15, 23, 42, 0.12);
        border-radius: 999px;
        padding: 10px 16px;
        background: rgba(255, 255, 255, 0.92);
        color: #0f172a;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 180ms ease,
          box-shadow 180ms ease,
          border-color 180ms ease;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
      }
      .sort-button:hover {
        transform: translateY(-1px);
        border-color: rgba(91, 33, 182, 0.28);
        box-shadow: 0 14px 28px rgba(15, 23, 42, 0.12);
      }
      .sort-button:active {
        transform: translateY(0);
      }
      rect {
        transition: all 200ms ease;
        cursor: pointer;
      }
      rect:hover {
        opacity: 0.9 !important;
        filter: brightness(1.15);
        stroke: #0f172a;
        stroke-width: 2;
      }
    </style>
  </head>
  <body>
    <div class="chart-container">
      <a href="index.html" class="back-link">← Quay lại trang chủ</a>
      <h1>
        So sánh nhiệt độ giữa các vùng - Sự khác biệt nhiệt độ trung bình giữa
        các location.region là gì?
      </h1>
      <div class="chart-controls">
        <button id="sort-ascending" class="sort-button" type="button">
          Sort Ascending
        </button>
        <button id="sort-descending" class="sort-button" type="button">
          Sort Descending
        </button>
      </div>
      <div id="stats" style="margin-top: 10px; font-weight: 700"></div>
      <svg id="chart2" style="max-width: 100%; height: auto"></svg>
    </div>

    <div id="tooltip"></div>

    <script src="task2.js"></script>
  </body>
</html>
