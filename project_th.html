<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Weather Data Visualization - D3.js</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://d3js.org/d3.v6.min.js"></script>
  </head>
  <body>
    <header>
      <h1>Trực quan hóa dữ liệu thời tiết Việt Nam</h1>
      <p>D3.js - Weather API Dataset (Kaggle, UTF-8)</p>
    </header>
    <div class="container">
      <h2>Biểu đồ 1: Nhiệt độ trung bình theo thời gian</h2>
      <div id="chart1" class="chart"></div>

      <h2>Biểu đồ 2: So sánh nhiệt độ giữa các vùng</h2>
      <div id="chart2" class="chart"></div>

      <h2>Biểu đồ 3: Phân tích thời tiết theo vùng</h2>
      <div id="chart3" class="chart"></div>
    </div>
    <div class="tooltip" id="tooltip"></div>
    <script src="scripts/main.js"></script>
  </body>
</html>
